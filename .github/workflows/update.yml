name: update-and-deploy-universal-ridge-radar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches: [main]
    paths:
      - "index.html"
      - "assets/**"
      - "config/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: universal-ridge-radar-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build raw-live radar data
        run: python scripts/build_universal_radar.py
      - name: Ensure Pages static mode
        run: touch .nojekyll
      - name: Commit generated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/derived/universal_ridge_radar.json data/derived/manifest.json .nojekyll
          git diff --cached --quiet || git commit -m "Update universal ridge radar bundle"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

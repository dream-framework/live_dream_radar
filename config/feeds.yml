# Universal Ridge / Dust Radar raw-live feed registry.
# Enabled feeds use public endpoints and no API key. Market indices are public vendor close feeds, not exchange-primary feeds.
# No synthetic, demo, generated, or manufactured source data is used.
# The app derives ridge/reach/dust diagnostics from raw observations after fetch.

min_successful_feeds: 2
output: data/derived/universal_ridge_radar.json

# Default S2/DREAM transforms in sample units after resampling.
analysis:
  resample_limit: 6
  ridge_spans: [5, 20, 60, 250]
  scale_windows: [20, 60, 250]
  phase_tail_points: 80
  min_points: 40

feeds:

  - key: spx_index
    enabled: true
    domain: market_indices
    label: SPX - S&P 500
    short_label: SPX
    owner: Yahoo Finance public chart feed
    source_type: json_chart
    source_tier: public_market_vendor
    adapter: yahoo_chart_index
    symbol: ^GSPC
    range: max
    interval: 1d
    cadence: daily_market
    resample: 1d
    unit: index_points
    metric: close
    notes: Public vendor chart feed. Uses unadjusted quote.close observations only; not exchange-primary data.


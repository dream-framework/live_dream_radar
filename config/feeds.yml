  - key: ieso_demand
    enabled: true
    domain: electrical_grid
    label: IESO Ontario Demand
    owner: Independent Electricity System Operator
    source_type: csv
    adapter: ieso_demand_csv
    url: https://reports-public.ieso.ca/public/Demand/PUB_Demand.csv
    cadence: hourly
    resample: 1h
    unit: MW
    metric: ontario_demand_mw
    value_column_candidates:
      - Ontario Demand
      - ONTARIO DEMAND
      - Demand
      - Market Demand
    notes: Official IESO hourly demand report.

  - key: nyiso_integrated_load
    enabled: true
    domain: electrical_grid
    label: NYISO Integrated Real-Time Actual Load
    owner: New York Independent System Operator
    source_type: csv_daily
    adapter: nyiso_pal_integrated_csv
    url_template: https://mis.nyiso.com/public/csv/palIntegrated/{yyyymmdd}palIntegrated.csv
    days_back: 14
    cadence: hourly
    resample: 1h
    unit: MW
    metric: integrated_load_mw
    notes: Official NYISO public CSV. Aggregates zones into statewide load by timestamp.

  - key: usgs_quakes_all_month
    enabled: true
    domain: geophysical
    label: USGS Global Earthquake Activity
    owner: United States Geological Survey
    source_type: geojson
    adapter: usgs_earthquake_geojson
    url: https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_month.geojson
    cadence: near_real_time
    resample: 1h
    unit: quake_intensity
    metric: seismic_activity_intensity
    notes: Official USGS GeoJSON feed aggregated by event time into hourly physical activity measures.


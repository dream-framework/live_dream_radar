# Not enabled by default because these usually require registration/API keys or more brittle query windows.
# Keep these in README as candidate extensions, not silent fallbacks.
optional_keyed_sources:
  - PJM Data Miner 2 requires approved API/subscription key.
  - ERCOT Public API requires registration/authentication for direct API use.
  - ENTSO-E Transparency Platform requires a security token.
  - ISO New England web services expose public data, but some endpoints may require credentials.
